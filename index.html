<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shuriken Team</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    overflow-x:hidden;
}

body{
    font-family:Arial,sans-serif;
    overflow-x:hidden;
    background:#FD7AC0;
}

.background{
    position:fixed;
    top:0;
    left:0;
    width:200%;
    height:100%;
    z-index:-1;
    background:
        repeating-linear-gradient(
            -45deg,
            #FD7AC0 0px,
            #FD7AC0 20px,
            #FDB3DD 20px,
            #FDB3DD 40px
        );
    animation:moveBackground 20s linear infinite;
}

@keyframes moveBackground{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}

.content{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding-top:0;
}

.logo{
    width:500px;
    height:auto;
    display:block;
    margin-top:0;
    margin-bottom:12px;
}

.gamebox{
    width:800px;
    min-height:320px;
    background:white;
    border-radius:30px;
    padding:35px;
    text-align:center;
    box-shadow:0 8px 24px rgba(0,0,0,.25);
    margin-bottom:40px;
}

.gamelogo{
    width:450px;
    height:auto;
    display:block;
    margin:0 auto 45px;
}

.gamebutton{
    display:inline-block;
    margin-top:15px;
    padding:14px 28px;
    background:#FD7AC0;
    color:white;
    text-decoration:none;
    border-radius:18px;
    font-weight:bold;
    font-size:42px;
    transition:background .2s;
}

.gamebutton:hover{
    background:#f25cab;
}

.socials{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-top:20px;
    margin-bottom:20px;
}

.discord,
.youtube{
    display:inline-block;
}

.discord img,
.youtube img{
    width:60px;
    display:block;
}

@media (max-width:900px){

    .logo{
        width:90%;
    }

    .gamebox{
        width:95%;
        padding:20px;
    }

    .gamelogo{
        width:90%;
    }

    .gamebutton{
        font-size:28px;
    }

}
</style>

</head>
<body>

<div class="background"></div>

<div class="content">

    <img class="logo" src="shuriken.png" alt="Shuriken Team">

    <div class="gamebox">
        <img class="gamelogo" src="sakura.png" alt="Sakura DS">
        <a class="gamebutton" href="https://shurikenteam.github.io/sakura">View More</a>
    </div>

    <div class="gamebox">
        <img class="gamelogo" src="dream.png" alt="Dreamcore Memorial">
        <a class="gamebutton" href="https://shurikenteam.github.io/dream">View More</a>
    </div>

    <div class="gamebox">
        <img class="gamelogo" src="burning.png" alt="Burning Ice">
        <a class="gamebutton" href="https://shurikenteam.github.io/burning">View More</a>
    </div>

    <div class="gamebox">
        <img class="gamelogo" src="minigp.png" alt="Mini GP">
        <a class="gamebutton" href="https://shurikenteam.github.io/minigp">View More</a>
    </div>

    <div class="socials">
        <a class="youtube" href="https://youtube.com/@shurikenteamofficial?si=OBhYDD_IboAj7G9A">
            <img src="youtube.png" alt="YouTube">
        </a>

        <a class="discord" href="https://discord.com/invite/RPwrYff5m4">
            <img src="discord.png" alt="Discord">
        </a>
    </div>

</div>

</body>
</html>
